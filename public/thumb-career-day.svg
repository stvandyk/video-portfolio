  <rect width="400" height="300" fill="#1a1a1e"/>
  <rect x="120" y="30" width="160" height="240" fill="#f5f0e8" rx="2"/>
  <text x="200" y="120" text-anchor="middle" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1a1a1e">CAREER DAY</text>
  <text x="200" y="145" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#555">Written by</text>
  <text x="200" y="162" text-anchor="middle" font-family="Courier New, monospace" font-size="10" fill="#1a1a1e">Brandon Johnston</text>
